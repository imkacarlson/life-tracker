<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D9488" />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>Life Tracker</title>
    <!-- Inline so the branded splash paints before any JS/CSS loads. Light-mode
         only app, so a fixed light background is safe (no FOUC handling needed). -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #FAFAF9;
        opacity: 1;
        transition: opacity 240ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      #app-splash.app-splash--hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-splash .app-splash__logo {
        width: 72px;
        height: 72px;
        animation: app-splash-pulse 1.4s ease-in-out infinite;
      }
      #app-splash .app-splash__wordmark {
        font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
        font-size: 1.0625rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: #57534E;
      }
      @keyframes app-splash-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(0.93); }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .app-splash__logo { animation: none; }
        #app-splash { transition: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-splash" role="status" aria-label="Loading Life Tracker">
      <svg class="app-splash__logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="48" height="48" rx="10" fill="#0D9488"/>
        <path d="M12 28L20 20L26 26L36 16" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M30 16H36V22" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="app-splash__wordmark">Life Tracker</span>
    </div>
    <script>
      // Shared, idempotent splash removal. Called by React once auth resolves,
      // by the error boundary before showing its fallback, and by the failsafe
      // timeout below — so the splash can never get stuck over a dead app.
      window.__removeAppSplash = function () {
        var el = document.getElementById('app-splash')
        if (!el) return
        el.classList.add('app-splash--hidden')
        window.setTimeout(function () {
          if (el && el.parentNode) el.parentNode.removeChild(el)
        }, 260)
      }
      // Failsafe: a hung boot still clears the splash after 10s.
      window.setTimeout(function () {
        if (window.__removeAppSplash) window.__removeAppSplash()
      }, 10000)
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
