name: Playwright E2E Tests

on:
  pull_request:

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Desktop Chrome tests
        run: npx playwright test --project="Desktop Chrome"
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Run Mobile Chrome tests
        run: npx playwright test --project="Mobile Chrome"
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload Desktop Chrome report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-Desktop-Chrome
          path: playwright-report/
          retention-days: 30

      - name: Upload Mobile Chrome report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-Mobile-Chrome
          path: playwright-report/
          retention-days: 30
